// ============================================================================
// Astrophage Engine Patch — Adds IX-PHM "Hail Mary" mode to the Dawn engine
// Uses B9PartSwitch to toggle between Stock (Xenon+EC) and IX-PHM (Astrophage)
// ============================================================================

@PART[ionEngine]:NEEDS[B9PartSwitch]:FOR[Astrophage]
{
	// Add the Astrophage engine module alongside the stock Ion one
	MODULE
	{
		name = ModuleEnginesFX
		engineID = Astrophage
		thrustVectorTransformName = thrustTransform
		exhaustDamage = True
		exhaustDamageDistanceOffset = 0.5
		ignitionThreshold = 0.1
		minThrust = 0
		maxThrust = 600
		heatProduction = 30
		powerEffectName = AstrophagePlume
		EngineType = Electric

		PROPELLANT
		{
			name = Astrophage
			ratio = 1.0
			DrawGauge = True
		}

		atmosphereCurve
		{
			// Vacuum: 1,500,000 s — exhaust velocity ~14,715 km/s
			key = 0 1500000
			// Sea level: severely degraded but functional
			key = 1 100000
			// 2 atm: very poor
			key = 2 10000
			// 5 atm: nearly useless
			key = 5 100
		}
	}

	// Add gimbal for the Astrophage mode (stock Dawn has none)
	MODULE
	{
		name = ModuleGimbal
		gimbalTransformName = thrustTransform
		gimbalRange = 3
		gimbalResponseSpeed = 12
		useGimbalResponseSpeed = true
	}

	// B9PartSwitch: toggle between Stock Dawn and IX-PHM Hail Mary
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = engineSwitch
		switcherDescription = Engine Type
		switchInFlight = false

		SUBTYPE
		{
			name = Stock
			title = IX-6315 "Dawn" Stock
			descriptionSummary = Standard xenon ion propulsion\n<b>Thrust:</b> 2 kN\n<b>ISP:</b> 4,200 s
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEnginesFX
					engineID = Ion
				}
				moduleActive = true
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEnginesFX
					engineID = Astrophage
				}
				moduleActive = false
			}
		}

		SUBTYPE
		{
			name = IX-PHM
			title = IX-PHM "Hail Mary"
			descriptionSummary = Astrophage-powered interstellar drive\n<b>Thrust:</b> 600 kN\n<b>ISP:</b> 1,500,000 s
			addedCost = 142000
			addedMass = 0.25
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEnginesFX
					engineID = Ion
				}
				moduleActive = false
			}
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEnginesFX
					engineID = Astrophage
				}
				moduleActive = true
			}
		}
	}
}

// ============================================================================
// Fallback stock particle effects for Astrophage plume (no Waterfall)
// ============================================================================
@PART[ionEngine]:NEEDS[B9PartSwitch&!Waterfall]:AFTER[Astrophage]
{
	@EFFECTS
	{
		AstrophagePlume
		{
			AUDIO
			{
				channel = Ship
				clip = sound_IonEngine
				volume = 0.0 0.0
				volume = 0.05 0.4
				volume = 1.0 0.8
				pitch = 0.0 0.5
				pitch = 1.0 1.2
				loop = true
			}
			MODEL_MULTI_PARTICLE
			{
				modelName = Squad/FX/IonPlume
				transformName = thrustTransform
				emission = 0.0 0.0
				emission = 0.25 0.5
				emission = 1.0 1.0
				localPosition = 0, 0, 0.12
			}
		}
	}
}
