// ============================================================================
// Astrophage Fuel Tank Patches
// Adds Astrophage as a fuel option to all tanks via B9PartSwitch
// ============================================================================

// ---------------------------------------------------------------------------
// CASE 1: Tanks that already have a B9PartSwitch fuelSwitch module
// (e.g., from CryoTanks, NearFuturePropulsion, etc.)
// Append an Astrophage subtype to the existing switcher
// No addedMass/addedCost needed — B9 tankType handles mass via tankMass * baseVolume
// ---------------------------------------------------------------------------
@PART[*]:HAS[@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch],!SUBTYPE[Astrophage]]]:NEEDS[B9PartSwitch]:AFTER[zzz_CryoTanks]
{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]
	{
		SUBTYPE
		{
			name = Astrophage
			title = Astrophage
			tankType = Astrophage
		}
	}
}

// ---------------------------------------------------------------------------
// CASE 2: Stock LF/OX tanks WITHOUT any B9PartSwitch fuelSwitch
// (fallback for installs without CryoTanks)
// Creates a new B9PartSwitch module with LFO and Astrophage options
// ---------------------------------------------------------------------------
@PART[*]:HAS[@RESOURCE[LiquidFuel],@RESOURCE[Oxidizer],!MODULE[ModuleEnginesFX],!MODULE[ModuleEngines],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]]:NEEDS[B9PartSwitch&!CryoTanks]:FOR[Astrophage]
{
	%totalCap = #$RESOURCE[LiquidFuel]/maxAmount$
	@totalCap += #$RESOURCE[Oxidizer]/maxAmount$

	%massOffset = #$totalCap$
	@massOffset *= 0.000625
	@massOffset *= -1

	%LF = #$RESOURCE[LiquidFuel]/maxAmount$
	%OX = #$RESOURCE[Oxidizer]/maxAmount$
	@LF *= #$@RESOURCE_DEFINITION[LiquidFuel]/unitCost$
	@OX *= #$@RESOURCE_DEFINITION[Oxidizer]/unitCost$
	%costOffset = #$LF$
	@costOffset += #$OX$
	@costOffset *= -1

	!RESOURCE[LiquidFuel] {}
	!RESOURCE[Oxidizer] {}

	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = fuelSwitch
		switcherDescription = Fuel Type
		baseVolume = #$../totalCap$

		SUBTYPE
		{
			name = LF/O
			title = LF/O
			tankType = LFO
			addedMass = #$../../massOffset$
			addedCost = #$../../costOffset$
		}
		SUBTYPE
		{
			name = LiquidFuel
			title = Liquid Fuel
			tankType = LiquidFuel
			addedMass = #$../../massOffset$
			addedCost = #$../../costOffset$
		}
		SUBTYPE
		{
			name = Oxidizer
			title = Oxidizer
			tankType = LFO
			addedMass = #$../../massOffset$
			addedCost = #$../../costOffset$
		}
		SUBTYPE
		{
			name = Astrophage
			title = Astrophage
			tankType = Astrophage
			addedMass = #$../../massOffset$
			addedCost = #$../../costOffset$
		}
	}

	// Cleanup temp variables
	!totalCap = delete
	!massOffset = delete
	!costOffset = delete
	!LF = delete
	!OX = delete
}

