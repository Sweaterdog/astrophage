// ---------------------------------------------------------------------------
// CASE 5: Xenon Gas tanks — add Astrophage alongside xenon
// Creates the B9 switcher first, then sets baseVolume via edit to avoid
// variable resolution issues in newly-inserted MODULE nodes.
// ---------------------------------------------------------------------------
@PART[*]:HAS[@RESOURCE[XenonGas],!MODULE[ModuleEnginesFX],!MODULE[ModuleEngines],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]]:NEEDS[B9PartSwitch]:FOR[Astrophage]
{
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = fuelSwitch
		switcherDescription = Fuel Type
		baseVolume = 1

		SUBTYPE
		{
			name = XenonGas
			title = Xenon Gas
			tankType = XenonGas
		}
		SUBTYPE
		{
			name = Astrophage
			title = Astrophage
			tankType = Astrophage
		}
	}

	// Edit the module to set correct baseVolume from the original resource
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]
	{
		@baseVolume = #$../RESOURCE[XenonGas]/maxAmount$
	}

	// Now safe to remove the original resource
	!RESOURCE[XenonGas] {}
}

// (CASE 1 above already handles all tanks with fuelSwitch, including MonoProp
//  tanks patched by CryoTanks, thanks to the !SUBTYPE[Astrophage] guard)
