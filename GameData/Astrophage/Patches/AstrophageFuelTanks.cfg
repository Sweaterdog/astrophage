	@massOffset *= -1

	%LF = #$RESOURCE[LiquidFuel]/maxAmount$
	@LF *= #$@RESOURCE_DEFINITION[LiquidFuel]/unitCost$
	%costOffset = #$LF$
	@costOffset *= -1

	!RESOURCE[LiquidFuel] {}

	MODULE
	{
		name = ModuleB9PartSwitch
