// CASE 3: LiquidFuel-only tanks (no oxidizer) without B9PartSwitch fuelSwitch
// ---------------------------------------------------------------------------
@PART[*]:HAS[@RESOURCE[LiquidFuel],!RESOURCE[Oxidizer],!MODULE[ModuleEnginesFX],!MODULE[ModuleEngines],!MODULE[ModuleB9PartSwitch]:HAS[#moduleID[fuelSwitch]]]:NEEDS[B9PartSwitch&!CryoTanks]:FOR[Astrophage]
