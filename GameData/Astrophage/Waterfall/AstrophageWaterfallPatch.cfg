// ============================================================================
// Waterfall Patch — Adds Astrophage purple plume to the Dawn engine
// Runs AFTER WaterfallRestock so its effects don't get clobbered
// ============================================================================

@PART[ionEngine]:NEEDS[Waterfall]:AFTER[WaterfallRestock]
{
	// Add Astrophage audio effects alongside existing Ion effects
	@EFFECTS
	{
		AstrophagePlume
		{
			AUDIO
			{
				channel = Ship
				clip = Waterfall/Sounds/NFT/sound_ion_loop
				volume = 0.0 0.0
				volume = 0.05 0.4
				volume = 1.0 0.8
				pitch = 0.0 0.4
				pitch = 1.0 1.0
				loop = true
			}
		}
	}

	// Add a second ModuleWaterfallFX for the Astrophage engine mode
	// The existing ionFX module handles the stock Ion plume
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = astrophageFX
		engineID = Astrophage

		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = throttle
			linkedTo = throttle
		}

		TEMPLATE
		{
			templateName = waterfall-astrophage-plume-1
			overrideParentTransform = thrustTransform
			scale = 1, 1, 1
			rotation = 0, 0, 0
			position = 0, 0, 0
		}
	}
}
