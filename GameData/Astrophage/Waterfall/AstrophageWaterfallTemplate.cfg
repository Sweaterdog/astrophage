// ============================================================================
// Astrophage Waterfall Plume Template
// A violet/purple ion-style plume that fades to invisible in atmosphere
// Represents directed IR photon emission from astrophage energy release
// ============================================================================

EFFECTTEMPLATE
{
	templateName = waterfall-astrophage-plume-1

	// --- CORE PLUME (inner bright violet) ---
	EFFECT
	{
		name = astrophageCoreEffect
		parentName = thrustTransform
		MODEL
		{
			path = Waterfall/FX/fx-simple-plume-ion
			positionOffset = 0, 0, -0.02
			rotationOffset = -90, 1, 0
			scaleOffset = 1.5, 1.8, 1.5

			MATERIAL
			{
				transform = CylMesh
				shader = Waterfall/Additive
				randomizeSeed = True
				TEXTURE
				{
					textureSlotName = _MainTex
					texturePath = Waterfall/FX/fx-ion-noise
					textureScale = 1, 1
					textureOffset = 0, 0
				}
				COLOR
				{
					// Deep violet/purple core
					colorName = _StartTint
					colorValue = 0.55, 0.1, 0.95, 0.7
				}
				COLOR
				{
					colorName = _EndTint
					colorValue = 0.85, 0.6, 1.0, 1.0
				}
				FLOAT
				{
					floatName = _TintFalloff
					value = 0.3
				}
				FLOAT
				{
					floatName = _Falloff
					value = 2.5
				}
				FLOAT
				{
					floatName = _Fresnel
					value = 2.5
				}
				FLOAT
				{
					floatName = _FresnelInvert
					value = 0
				}
				FLOAT
				{
					floatName = _Noise
					value = 0.6
				}
				FLOAT
				{
					floatName = _Brightness
					value = 0.15
				}
				FLOAT
				{
					floatName = _SpeedX
					value = 0
				}
				FLOAT
				{
					floatName = _SpeedY
					value = 12
				}
				FLOAT
				{
					floatName = _TileX
					value = 1
				}
				FLOAT
				{
					floatName = _TileY
					value = 1
				}
			}

			MATERIAL
			{
				transform = CylMeshOuter
				shader = Waterfall/Additive
				randomizeSeed = True
				TEXTURE
				{
					textureSlotName = _MainTex
					texturePath = Waterfall/FX/fx-ion-noise
					textureScale = 1, 1
					textureOffset = 0, 0
				}
				COLOR
				{
					// Outer purple glow
					colorName = _StartTint
					colorValue = 0.6, 0.15, 1.0, 1.0
				}
				COLOR
				{
					colorName = _EndTint
					colorValue = 0.8, 0.5, 1.0, 1.0
				}
				FLOAT
				{
					floatName = _TintFalloff
					value = 0.2
				}
				FLOAT
				{
					floatName = _Falloff
					value = 1.2
				}
				FLOAT
				{
					floatName = _Fresnel
					value = 4.5
				}
				FLOAT
				{
					floatName = _FresnelInvert
					value = 0
				}
				FLOAT
				{
					floatName = _Noise
					value = 0.9
				}
				FLOAT
				{
					floatName = _Brightness
					value = 0.25
				}
				FLOAT
				{
					floatName = _SpeedX
					value = 0
				}
				FLOAT
				{
					floatName = _SpeedY
					value = 60
				}
				FLOAT
				{
					floatName = _TileX
					value = 4
				}
				FLOAT
				{
					floatName = _TileY
					value = 0.1
				}
			}

			MATERIAL
			{
				transform = PlaneMesh
				shader = Waterfall/Additive
				randomizeSeed = True
				TEXTURE
				{
					textureSlotName = _MainTex
					texturePath = Waterfall/FX/fx-ion-noise
					textureScale = 1, 1
					textureOffset = 0, 0
				}
				COLOR
				{
					// Soft purple halo
					colorName = _StartTint
					colorValue = 0.5, 0.05, 0.9, 1.0
				}
				COLOR
				{
					colorName = _EndTint
					colorValue = 0.75, 0.4, 1.0, 1.0
				}
				FLOAT
				{
					floatName = _TintFalloff
					value = 0.2
				}
				FLOAT
				{
					floatName = _Falloff
					value = 2.5
				}
				FLOAT
				{
					floatName = _Fresnel
					value = 4.5
				}
				FLOAT
				{
					floatName = _FresnelInvert
					value = 3
				}
				FLOAT
				{
					floatName = _Noise
					value = 0
				}
				FLOAT
				{
					floatName = _Brightness
					value = 0.8
				}
				FLOAT
				{
					floatName = _SpeedX
					value = 0
				}
				FLOAT
				{
					floatName = _SpeedY
					value = 1
				}
				FLOAT
				{
					floatName = _TileX
					value = 1
				}
				FLOAT
				{
					floatName = _TileY
					value = 1
				}
			}
		}

		// --- THROTTLE SCALE: plume grows with throttle ---
		SCALEMODIFIER
		{
			name = throttleScale
			controllerName = throttle
			transformName = CylMesh
			combinationType = REPLACE
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			xCurve
			{
				key = 0 0.5 0 0
				key = 1 0.5 0 0
			}
			yCurve
			{
				key = 0 0.5 0 0
				key = 1 1.2 0 0
			}
			zCurve
			{
				key = 0 0.5 0 0
				key = 1 0.5 0 0
			}
		}
		SCALEMODIFIER
		{
			name = globalScale
			controllerName = throttle
			transformName = Waterfall/FX/fx-simple-plume-ion(Clone)
			combinationType = REPLACE
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			xCurve
			{
				key = 0 0.5 0 0
			}
			yCurve
			{
				key = 0 1.2 0 0
			}
			zCurve
			{
				key = 0 0.5 0 0
			}
		}

		// --- THROTTLE BRIGHTNESS: inner glow ---
		FLOATMODIFIER
		{
			name = innerBright
			controllerName = throttle
			transformName = CylMesh
			combinationType = REPLACE
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			floatName = _Brightness
			floatCurve
			{
				key = 0 0 0 0
				key = 0.1 0.05 0 0
				key = 1 0.15 0 0
			}
		}

		// --- THROTTLE BRIGHTNESS: outer glow ---
		FLOATMODIFIER
		{
			name = outerBright
			controllerName = throttle
			transformName = CylMeshOuter
			combinationType = REPLACE
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			floatName = _Brightness
			floatCurve
			{
				key = 0 0 0 0
				key = 0.1 0.08 0 0
				key = 1 0.25 0 0
			}
		}

		// --- THROTTLE BRIGHTNESS: halo plane ---
		FLOATMODIFIER
		{
			name = haloBright
			controllerName = throttle
			transformName = PlaneMesh
			combinationType = REPLACE
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			floatName = _Brightness
			floatCurve
			{
				key = 0 0 0 0
				key = 0.05 0.3 0 0
				key = 1 1.0 0 0
			}
		}

		// --- ATMOSPHERE FADE: plume becomes invisible in atmosphere ---
		// Multiplies brightness by 0 when in atmosphere, 1 in vacuum
		FLOATMODIFIER
		{
			name = atmosFadeInner
			controllerName = atmosphereDepth
			transformName = CylMesh
			combinationType = MULTIPLY
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			floatName = _Brightness
			floatCurve
			{
				// 0 atmosphere = full brightness, >0.01 = rapidly fading
				key = 0 1 0 0
				key = 0.005 0.5 0 0
				key = 0.02 0.1 0 0
				key = 0.1 0 0 0
			}
		}
		FLOATMODIFIER
		{
			name = atmosFadeOuter
			controllerName = atmosphereDepth
			transformName = CylMeshOuter
			combinationType = MULTIPLY
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			floatName = _Brightness
			floatCurve
			{
				key = 0 1 0 0
				key = 0.005 0.5 0 0
				key = 0.02 0.1 0 0
				key = 0.1 0 0 0
			}
		}
		FLOATMODIFIER
		{
			name = atmosFadeHalo
			controllerName = atmosphereDepth
			transformName = PlaneMesh
			combinationType = MULTIPLY
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			floatName = _Brightness
			floatCurve
			{
				key = 0 1 0 0
				key = 0.005 0.5 0 0
				key = 0.02 0.1 0 0
				key = 0.1 0 0 0
			}
		}
	}

	// --- ENGINE LIGHT (purple point light) ---
	EFFECT
	{
		name = astrophageEngineLight
		parentName = thrustTransform
		MODEL
		{
			path = Waterfall/FX/fx-point-light
			positionOffset = 0, 0, 0.5
			rotationOffset = 0, 0, 0
			scaleOffset = 1, 1, 1
			LIGHT
			{
				transform = Light
				intensity = 1.5
				range = 4
				lightType = Point
				// Purple engine glow
				color = 0.55, 0.15, 0.85, 1.0
				angle = 0
			}
		}
		LIGHTFLOATMODIFIER
		{
			name = throttleLightBright
			controllerName = throttle
			transformName = Light
			combinationType = REPLACE
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			floatName = Intensity
			floatCurve
			{
				key = 0 0 0 0
				key = 0.01 1.0 0 0
				key = 1 1.5 0 0
			}
		}
		// Light also fades in atmosphere
		LIGHTFLOATMODIFIER
		{
			name = atmosLightFade
			controllerName = atmosphereDepth
			transformName = Light
			combinationType = MULTIPLY
			useRandomness = False
			randomnessController = random
			randomnessScale = 1
			floatName = Intensity
			floatCurve
			{
				key = 0 1 0 0
				key = 0.005 0.5 0 0
				key = 0.02 0.1 0 0
				key = 0.1 0 0 0
			}
		}
	}
}
